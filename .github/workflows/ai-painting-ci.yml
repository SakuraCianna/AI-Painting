name: AI Painting CI

"on":
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Backend frontend and Docker checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AI_PAINTING_DB: /tmp/ai_painting_ci.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          npm ci --prefix frontend

      - name: Compile backend
        run: python -m compileall backend/app backend/tests

      - name: Run backend tests with coverage
        run: python -m pytest backend/tests --cov=app --cov-report=term-missing --cov-fail-under=85

      - name: Run frontend tests with coverage
        run: npm run test:coverage --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config --quiet

      - name: Build Docker backup images
        run: docker compose -f docker-compose.yml build

      - name: Start API and verify health
        shell: bash
        run: |
          python -m uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8084 &
          api_pid=$!
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8084/health; then
              kill "$api_pid"
              wait "$api_pid" || true
              exit 0
            fi
            sleep 1
          done
          kill "$api_pid" || true
          wait "$api_pid" || true
          exit 1
