name: AI Painting CI

"on":
  pull_request: {}
  push: {}
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      AI_PAINTING_DB: ${{ runner.temp }}/ai_painting_test.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend/app backend/tests

      - name: Run backend tests
        run: python -m pytest backend/tests -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  api-smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    env:
      AI_PAINTING_DB: ${{ runner.temp }}/ai_painting_smoke.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Start API and verify health
        shell: bash
        run: |
          python -m uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8080 &
          api_pid=$!
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/health; then
              kill "$api_pid"
              wait "$api_pid" || true
              exit 0
            fi
            sleep 1
          done
          kill "$api_pid" || true
          wait "$api_pid" || true
          exit 1

  docker-backup-build:
    name: Docker backup build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config

      - name: Build Docker backup images
        run: docker compose -f docker-compose.yml build
