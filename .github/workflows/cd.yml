name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    name: Package release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          npm ci --prefix frontend

      - name: Verify backend
        run: python -m pytest backend/tests -q

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Assemble package
        shell: bash
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          package_name="ai-painting-${safe_ref}-${GITHUB_SHA::7}"
          mkdir -p "$package_name/backend" "$package_name/frontend-dist" "$package_name/docs"
          cp -r backend/app "$package_name/backend/app"
          cp backend/requirements.txt "$package_name/backend/requirements.txt"
          cp -r frontend/dist/. "$package_name/frontend-dist/"
          cp -r docs/. "$package_name/docs/"
          cp README.md ROADMAP.md "$package_name/"
          cp "需求文档.md" "设计文档.md" "快速启动.bat" "$package_name/"
          zip -r "$package_name.zip" "$package_name"
          echo "PACKAGE_ZIP=$package_name.zip" >> "$GITHUB_ENV"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ai-painting-release-package
          path: ${{ env.PACKAGE_ZIP }}
          retention-days: 30

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: ai-painting-release-package

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" ./*.zip --generate-notes
