services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AI_PAINTING_DB: /app/backend/data/ai_painting.sqlite3
      AI_PAINTING_ASR_PROVIDERS: ${AI_PAINTING_ASR_PROVIDERS:-xiaomi,local}
      AI_PAINTING_ASR_LANGUAGE: ${AI_PAINTING_ASR_LANGUAGE:-zh}
      AI_PAINTING_LOCAL_ASR_URL: ${AI_PAINTING_LOCAL_ASR_URL:-}
      AI_PAINTING_LOCAL_ASR_LABEL: ${AI_PAINTING_LOCAL_ASR_LABEL:-Qwen3-ASR 本地服务}
      AI_PAINTING_CORS_ORIGINS: ${AI_PAINTING_CORS_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      AI_PAINTING_ENABLE_LLM_PLANNER: ${AI_PAINTING_ENABLE_LLM_PLANNER:-false}
      AI_PAINTING_MIMO_LLM_MODEL: ${AI_PAINTING_MIMO_LLM_MODEL:-mimo-v2.5-pro}
      AI_PAINTING_MIMO_TTS_MODEL: ${AI_PAINTING_MIMO_TTS_MODEL:-mimo-v2-tts}
      AI_PAINTING_MIMO_TTS_VOICE: ${AI_PAINTING_MIMO_TTS_VOICE:-default_zh}
      AI_PAINTING_MIMO_TTS_STYLE: ${AI_PAINTING_MIMO_TTS_STYLE:-自然 清晰}
      AI_PAINTING_PLANTUML_JAR: ${AI_PAINTING_PLANTUML_JAR:-/app/backend/tools/plantuml.jar}
      AI_PAINTING_PLANTUML_SERVER_URL: ${AI_PAINTING_PLANTUML_SERVER_URL:-http://plantuml-server:8080}
      AI_PAINTING_PLANTUML_FONT_NAME: ${AI_PAINTING_PLANTUML_FONT_NAME:-Noto Sans CJK SC}
      AI_PAINTING_JAVA_BIN: ${AI_PAINTING_JAVA_BIN:-java}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
    depends_on:
      - plantuml-server
    ports:
      - "${AI_PAINTING_BACKEND_PORT:-8084}:8080"
    volumes:
      - ai-painting-backend-data:/app/backend/data
    restart: unless-stopped

  plantuml-server:
    image: plantuml/plantuml-server:jetty
    ports:
      - "${AI_PAINTING_PLANTUML_SERVER_PORT:-8090}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "${AI_PAINTING_FRONTEND_PORT:-3001}:80"
    restart: unless-stopped

volumes:
  ai-painting-backend-data:
